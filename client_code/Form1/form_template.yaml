is_package: true
container:
  type: HtmlTemplate
  properties:
    html: '@theme:standard-page.html'
    background: theme:Tertiary Container
    border: '23'
    foreground: theme:On Secondary Container
    role: [selected, outlined-card, outlined-button]
  data_bindings:
  - {property: tooltip, code: 'self.item['''']', writeback: false}
components:
- type: FlowPanel
  properties: {}
  name: navbar_links
  layout_properties: {slot: nav-right}
  components: []
- type: ColumnPanel
  properties: {col_widths: '{}', background: 'theme:On Primary', col_spacing: small}
  name: content_panel
  layout_properties: {slot: default}
  components:
  - name: label_5
    properties: {align: center, border: '', text: SRM REGISTRATION FORM, font_size: 23,
      spacing_below: large, italic: false, background: '', bold: false, underline: true}
    type: Label
    layout_properties: {grid_position: 'NPKLPU,JSKVDH'}
  - name: label_6
    properties: {text: ~ AANYA, font_size: 15, align: right}
    type: Label
    layout_properties: {grid_position: 'NHCMIH,DCZQTB'}
  - name: label_1
    properties: {align: left, bold: true, text: Enter your name, spacing_above: medium,
      spacing_below: medium, font_size: 19, italic: true}
    type: Label
    layout_properties: {grid_position: 'NPNEVT,DQMBOF'}
  - name: text_box_1
    properties: {placeholder: YOUR NAME, bold: false, background: ''}
    type: TextBox
    layout_properties: {grid_position: 'ZSDKUS,RTGMDF'}
    data_bindings:
    - {property: placeholder, code: 'self.item['''']', writeback: false}
    event_bindings: {pressed_enter: text_box_1_pressed_enter}
  - name: label_2
    properties: {text: Enter your email id, bold: true, font: '19', font_size: 19}
    type: Label
    layout_properties: {grid_position: 'EBVTBX,GCSIDE'}
  - name: text_box_2
    properties: {placeholder: 'EMAIL ID ', spacing_below: medium}
    type: TextBox
    layout_properties: {grid_position: 'NWADBF,QFWLCT'}
  - name: label_3
    properties: {text: Enter your branch, bold: true, font_size: 19, italic: true}
    type: Label
    layout_properties: {grid_position: 'ULHEBN,LACOMA'}
  - name: text_box_3
    properties: {placeholder: FIELD}
    type: TextBox
    layout_properties: {grid_position: 'KQXHQA,BRKPYP'}
  - name: check_box1
    properties: {text: 'WANT A COPY  OF RESPONSE?', italic: true, background: 'theme:On
        Primary', foreground: 'theme:On Primary Container', underline: true, icon: 'fa:angle-double-right',
      font: '', font_size: 16}
    type: Label
    layout_properties: {grid_position: 'VXPIXE,PTQFPT'}
    data_bindings: []
  - name: check_box_1
    properties: {text: 'YES', bold: false, font_size: 15, italic: true}
    type: CheckBox
    layout_properties: {grid_position: 'EIXVSN,FIIYKX'}
    data_bindings:
    - {property: text, code: '', writeback: false}
  - name: outlined_button_1
    properties: {text: SUMBIT, role: outlined-button, background: 'theme:Secondary
        Container', icon_align: left_edge, align: left, font_size: 15, italic: true}
    type: Button
    layout_properties: {grid_position: 'HIYVEI,PGOUGM'}
    event_bindings: {click: outlined_button_1_click}
  - name: image_1
    properties: {source: _/theme/srm.jpeg, visible: true, display_mode: fill_width}
    type: Image
    layout_properties: {grid_position: 'IOHDQB,SSIXXG'}
  - name: label_4
    properties: {role: title, align: center, border: ROUND, foreground: 'theme:Primary',
      text: THANKS FOR VISITING !!!!!!!!!, font_size: 19, font: CALABRIC, spacing_above: large,
      icon_align: top, spacing_below: large, italic: true, background: 'theme:Secondary
        Container', bold: true}
    type: Label
    layout_properties: {grid_position: 'DVBDLA,VWQLYA'}
  data_bindings: []
