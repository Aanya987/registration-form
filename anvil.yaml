dependencies: []
services:
- source: /runtime/services/tables.yml
  client_config: {}
  server_config: {}
- source: /runtime/services/anvil/email.yml
  client_config: {}
  server_config: {}
- source: /runtime/services/anvil/secrets.yml
  client_config: {}
  server_config: {}
- source: /runtime/services/google.yml
  client_config: {}
  server_config: {}
- source: /runtime/services/anvil/users.yml
  client_config: {allow_signup: false, enable_automatically: true, use_email: true,
    confirm_email: true}
  server_config: {user_table: users}
package_name: registration_form
allow_embedding: false
name: registration form
runtime_options: {version: 2, client_version: '3', server_version: python3-sandbox,
  server_spec: null}
metadata: {title: 'enter the entries ', description: registration website}
startup_form: Form1
db_schema:
  table_1:
    client: full
    server: full
    columns:
    - name: name
      admin_ui: {order: 0, width: 200}
      type: string
    - name: mailid
      admin_ui: {order: 1, width: 291}
      type: string
    - name: branch
      admin_ui: {order: 2, width: 200}
      type: string
    - name: response
      admin_ui: {order: 3, width: 200}
      type: bool
    title: Table 1
  users:
    client: none
    server: full
    columns:
    - name: email
      admin_ui: {order: 0, width: 200}
      type: string
    - name: enabled
      admin_ui: {order: 1, width: 200}
      type: bool
    - name: last_login
      admin_ui: {order: 2, width: 200}
      type: datetime
    - name: password_hash
      admin_ui: {order: 3, width: 200}
      type: string
    - name: n_password_failures
      admin_ui: {order: 4, width: 200}
      type: number
    - name: confirmed_email
      admin_ui: {order: 5, width: 200}
      type: bool
    title: Users
uplink_visible: true
renamed: true
